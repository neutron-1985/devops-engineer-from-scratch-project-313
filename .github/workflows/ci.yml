name: Code Quality

on:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test

