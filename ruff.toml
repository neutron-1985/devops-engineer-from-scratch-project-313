line-length = 88
target-version = "py314"

exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    "dist",
    "build",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # import sorting
    "UP",  # pyupgrade
    "B",   # bugbear
]

ignore = [
    "E501", # line too long (controlled by formatter/line-length)
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true